name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "0[0-9][0-9][0-9]-*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Sync dev deps
        run: uv pip install --system -e ".[dev]"
      - name: ruff check (BOSS scope)
        run: ruff check src/boss_automation/ tests/unit/boss/ tests/_fixtures/ scripts/dump_boss_ui.py
      - name: ruff format check (BOSS scope)
        run: ruff format --check src/boss_automation/ tests/unit/boss/ tests/_fixtures/ scripts/dump_boss_ui.py

  python-tests-boss:
    name: Python Tests (BOSS scope, coverage gated)
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Sync dev deps
        run: uv pip install --system -e ".[dev]"
      - name: Run BOSS unit tests with coverage gate
        run: |
          pytest tests/unit/boss/ \
            -v --tb=short \
            -p no:logfire \
            --cov=src/boss_automation \
            --cov-report=term-missing \
            --cov-report=xml:coverage-boss.xml \
            --cov-fail-under=80
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-boss
          path: coverage-boss.xml
          if-no-files-found: ignore

  python-tests-legacy:
    name: Python Tests (WeCom legacy, non-blocking)
    runs-on: ubuntu-latest
    needs: python-lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Sync dev deps
        run: uv pip install --system -e ".[dev]"
      - name: Run legacy unit tests (informational)
        run: |
          pytest tests/unit/ \
            --ignore=tests/unit/boss/ \
            -p no:logfire \
            --tb=short \
            -q || true

  frontend-lint-and-test:
    name: Frontend Lint + Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wecom-desktop
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: wecom-desktop/package-lock.json
      - name: Install deps
        run: npm ci || npm install --no-audit --no-fund
      - name: ESLint
        run: npx eslint --ext .vue,.ts,.tsx,.js src/ || true
      - name: TypeScript check
        run: npx vue-tsc --noEmit
      - name: Vitest unit tests
        run: npx vitest run
